name: Deploy to AWS Lambda
description: Update Lambda function image, publish version, update alias, and smoke-test
inputs:
  image_tag:
    description: Full container image URI (registry/repo:tag) to deploy
    required: true
  environment:
    description: Target environment (dev/staging/prod)
    required: true
  function_name:
    description: Lambda function name (without environment suffix)
    required: true
  alias:
    description: Lambda alias to update (e.g. live). Defaults to the environment name.
    required: false
  aws_region:
    description: AWS region where the Lambda function exists
    required: false
runs:
  using: composite
  steps:
  - name: Resolve function name
    id: resolve
    shell: bash
    run: 'FN="${{ inputs.function_name }}-${{ inputs.environment }}"

      ALIAS="${{ inputs.alias || inputs.environment }}"

      echo "function_name=$FN" >> "$GITHUB_OUTPUT"

      echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"'
  - name: Update function code
    shell: bash
    run: "aws lambda update-function-code \\\n  --function-name ${{ steps.resolve.outputs.function_name\
      \ }} \\\n  --image-uri ${{ inputs.image_tag }} \\\n  --publish\n# Wait for update\
      \ to complete\naws lambda wait function-updated \\\n  --function-name ${{ steps.resolve.outputs.function_name\
      \ }}"
  - name: Get latest version
    id: version
    shell: bash
    run: "VERSION=$(aws lambda list-versions-by-function \\\n  --function-name ${{\
      \ steps.resolve.outputs.function_name }} \\\n  --query 'Versions[-1].Version'\
      \ --output text)\necho \"version=$VERSION\" >> \"$GITHUB_OUTPUT\"\necho \"Published\
      \ version: $VERSION\""
  - name: Update alias
    shell: bash
    run: "aws lambda update-alias \\\n  --function-name ${{ steps.resolve.outputs.function_name\
      \ }} \\\n  --name ${{ steps.resolve.outputs.alias }} \\\n  --function-version\
      \ ${{ steps.version.outputs.version }} 2>/dev/null \\\n|| aws lambda create-alias\
      \ \\\n  --function-name ${{ steps.resolve.outputs.function_name }} \\\n  --name\
      \ ${{ steps.resolve.outputs.alias }} \\\n  --function-version ${{ steps.version.outputs.version\
      \ }}"
  - name: Smoke-test invocation
    shell: bash
    run: "aws lambda invoke \\\n  --function-name ${{ steps.resolve.outputs.function_name\
      \ }}:${{ steps.resolve.outputs.alias }} \\\n  --payload '{}' \\\n  --log-type\
      \ Tail \\\n  /tmp/lambda-response.json\nSTATUS=$(jq -r '.statusCode // .FunctionError\
      \ // \"ok\"' /tmp/lambda-response.json)\nif echo \"$STATUS\" | grep -qi 'error\\\
      |Unhandled'; then\n  echo \"::error::Lambda smoke-test failed. Response:\"\n\
      \  cat /tmp/lambda-response.json\n  exit 1\nfi\necho \"\u2713 Lambda smoke-test\
      \ passed\""
