name: CD Deploy (Reusable)
'on':
  workflow_call:
    inputs:
      image_sha:
        description: Full commit SHA whose CI-built images should be deployed
        required: true
        type: string
      health_check_url:
        description: External health check URL. Empty = derive from Ingress/LoadBalancer
          endpoint.
        required: false
        type: string
        default: ''
      health_check_timeout:
        description: Health check timeout in seconds
        required: false
        type: number
        default: 300
permissions:
  id-token: write
  contents: read
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Deploy (dev) - NO TARGET CONFIGURED
      run: 'echo ''::error::No deployment target detected for this repository. CD
        cannot deploy. Configure a deployment target (ECS/ACA/GKE/Kubernetes) via
        policy/detection and re-generate.''

        exit 1'
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs:
    - deploy-dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Deploy (staging) - NO TARGET CONFIGURED
      run: 'echo ''::error::No deployment target detected for this repository. CD
        cannot deploy. Configure a deployment target (ECS/ACA/GKE/Kubernetes) via
        policy/detection and re-generate.''

        exit 1'
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs:
    - deploy-staging
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Deploy (prod) - NO TARGET CONFIGURED
      run: 'echo ''::error::No deployment target detected for this repository. CD
        cannot deploy. Configure a deployment target (ECS/ACA/GKE/Kubernetes) via
        policy/detection and re-generate.''

        exit 1'
