name: CD Deploy (Reusable)
'on':
  workflow_call:
    inputs:
      image_tag:
        description: Container image tag (SHA) to deploy
        required: true
        type: string
      service_name:
        description: Service name to deploy
        required: true
        type: string
      health_check_url:
        description: Health check endpoint URL
        required: true
        type: string
      health_check_timeout:
        description: Health check timeout in seconds
        required: false
        type: number
        default: 300
      aws_role_arn:
        description: AWS IAM Role ARN for OIDC
        required: true
        type: string
      aws_region:
        description: AWS region
        required: false
        type: string
        default: us-east-1
      ecs_cluster:
        description: ECS cluster name
        required: true
        type: string
      ecs_service:
        description: ECS service name
        required: true
        type: string
permissions:
  id-token: write
  contents: read
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with: &id001
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
    - name: Deploy (dev) - NO TARGET CONFIGURED
      run: 'echo ''::error::No deployment target detected for this repository. CD
        cannot deploy. Configure a deployment target (ECS/ACA/GKE/Kubernetes) via
        policy/detection and re-generate.''

        exit 1'
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs:
    - deploy-dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with: *id001
    - name: Deploy (staging) - NO TARGET CONFIGURED
      run: 'echo ''::error::No deployment target detected for this repository. CD
        cannot deploy. Configure a deployment target (ECS/ACA/GKE/Kubernetes) via
        policy/detection and re-generate.''

        exit 1'
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs:
    - deploy-staging
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with: *id001
    - name: Deploy (prod) - NO TARGET CONFIGURED
      run: 'echo ''::error::No deployment target detected for this repository. CD
        cannot deploy. Configure a deployment target (ECS/ACA/GKE/Kubernetes) via
        policy/detection and re-generate.''

        exit 1'
