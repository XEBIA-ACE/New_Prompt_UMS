# CD Deploy — caller workflow. Fires after CI Build succeeds on main, or manually.
#
# CHANGES (EKS deployment enablement, 2026-07-10 — see DOCS/DEPLOYMENT.md):
#   - `image_tag` (was the raw 40-char SHA, which never matched CI's sha-<short>
#     tags) replaced with `image_sha`; the reusable workflow derives the tag with
#     the same sha-<first 7> contract CI uses.
#   - `service_name` input dropped (single fixed target); EKS coordinates
#     (registry, region, cluster, namespace) passed explicitly.
#   - `workflow_dispatch` fallback `|| github.sha` kept, but the reusable
#     workflow verifies the images actually exist in ECR before deploying, so a
#     dispatch on an unbuilt commit fails fast with a clear error instead of
#     ImagePullBackOff.
#   - HEALTH_CHECK_URL is now optional: when unset, the deploy job resolves the
#     ALB hostname from the Ingress and probes http://<alb>/health directly.
name: CD Deploy
'on':
  workflow_run:
    workflows:
    - CI Build
    types:
    - completed
    branches:
    - main
    - develop
  workflow_dispatch: {}
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/cd-deploy-reusable.yml
    with:
      image_sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      ecr_registry: 864899865567.dkr.ecr.us-east-1.amazonaws.com
      aws_region: us-east-1
      cluster_name: aiops-prod
      namespace: ums
      health_check_url: ${{ vars.HEALTH_CHECK_URL }}
    secrets: inherit
