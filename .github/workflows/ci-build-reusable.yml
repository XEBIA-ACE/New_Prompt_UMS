name: CI Build (Reusable)
'on':
  workflow_call:
    inputs:
      services:
        description: JSON list of services to build
        required: true
        type: string
      registries:
        description: JSON list of registry URLs
        required: true
        type: string
      build_args:
        description: Additional Docker build arguments
        required: false
        type: string
        default: ''
permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.changes }}
      has_changes: ${{ steps.changes.outputs.changes != '[]' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect changes
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: 'BACKEND:

          - BACKEND/**

          FRONTEND:

          - FRONTEND/**

          '
        list-files: json
  lint:
    runs-on: ubuntu-latest
    needs:
    - detect-changes
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Lint
      run: npm ci && npm run lint
      working-directory: BACKEND
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    services:
      redis:
        image: redis:7-alpine
        ports:
        - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run tests
      run: npm ci && npm test
      working-directory: BACKEND
  build:
    runs-on: ubuntu-latest
    needs:
    - test
    - detect-changes
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: image=moby/buildkit:latest
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ (inputs.registries == '' || inputs.registries == '[]') && format('local/{0}', matrix.service.name) ||
          inputs.registries }}
        tags: type=sha,prefix=sha-,format=short
    - name: Build image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.build_context || '.' }}
        file: ${{ matrix.service.build_context || '.' }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
        push: false
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
  scan:
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build image for scanning
      uses: docker/build-push-action@v5
      with:
        context: BACKEND
        file: BACKEND/Dockerfile
        push: false
        load: true
        tags: ci-scan-image:${{ github.sha }}
        cache-from: type=gha
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: ci-scan-image:${{ github.sha }}
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        exit-code: '1'
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
  push:
    runs-on: ubuntu-latest
    needs:
    - scan
    if: ${{ inputs.registries != '' && inputs.registries != '[]' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registries }}
        tags: type=sha,prefix=sha-,format=short
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: BACKEND
        file: BACKEND/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
