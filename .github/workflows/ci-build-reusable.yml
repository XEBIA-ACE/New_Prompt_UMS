# CI Build (Reusable) — builds, tests, scans, and pushes service images.
#
# CHANGES (EKS deployment enablement, 2026-07-10 — see DOCS/DEPLOYMENT.md):
#   - Input `registries` (JSON list, never worked per-service) replaced with
#     `ecr_registry` (single ECR registry host) + per-service `image` field in
#     the `services` JSON. Empty ecr_registry = build/scan only, no push.
#   - `scan` and `push` jobs were hardcoded to BACKEND — both now run on the
#     service matrix, so the FRONTEND image is scanned and pushed too.
#   - `push` now: (a) authenticates to AWS via OIDC (aws-actions/configure-aws-
#     credentials@v6 + secrets.AWS_ROLE_ARN), (b) logs into ECR, (c) tags images
#     `sha-<first 7 chars of commit SHA>` — computed with shell substring, NOT
#     docker/metadata-action, so CI and CD share one deterministic tag contract.
#   - `push` only runs on push events (never from PRs) and only after `scan`
#     passes — vulnerable images never reach the registry.
#   - On push to main/master the matrix is ALL services regardless of changed
#     paths: CD deploys both images by the same sha- tag, so every deployable
#     commit must have a complete image set in ECR. Change detection still
#     limits PR builds to changed services.
#   - Buildx GHA cache gets a per-service scope (the shared default scope let
#     backend and frontend cache entries clobber each other).
#   - Trivy: `ignore-unfixed: true` so unfixable base-image CVEs don't block
#     deploys; SARIF uploads get a per-service category (second upload would
#     otherwise overwrite the first).
name: CI Build (Reusable)
'on':
  workflow_call:
    inputs:
      services:
        description: 'JSON list of services: [{name, build_context, dockerfile, image}] — `image` is the ECR repository name'
        required: true
        type: string
      ecr_registry:
        description: ECR registry host (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com). Empty = build only, no push.
        required: false
        type: string
        default: ''
      aws_region:
        description: AWS region of the ECR registry
        required: false
        type: string
        default: us-east-1
      build_args:
        description: Additional Docker build arguments
        required: false
        type: string
        default: ''
permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write
  security-events: write
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.matrix != '[]' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect changes
      id: changes
      if: github.event_name == 'pull_request'
      uses: dorny/paths-filter@v3
      with:
        filters: |
          BACKEND:
            - 'BACKEND/**'
          FRONTEND:
            - 'FRONTEND/**'
    - name: Resolve service matrix
      id: matrix
      env:
        SERVICES: ${{ inputs.services }}
        CHANGED: ${{ steps.changes.outputs.changes || '[]' }}
      # Push events (main/master): full matrix — every deployable commit needs a
      # complete sha-tagged image set in ECR or CD hits ImagePullBackOff.
      # Pull requests: only changed services, for fast feedback.
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          echo "matrix=$(echo "$SERVICES" | jq -c .)" >> "$GITHUB_OUTPUT"
        else
          echo "matrix=$(echo "$SERVICES" | jq -c --argjson changed "$CHANGED" '[.[] | select(.name as $n | $changed | index($n))]')" >> "$GITHUB_OUTPUT"
        fi
  lint:
    runs-on: ubuntu-latest
    needs:
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Lint
      run: npm ci && npm run lint
      working-directory: BACKEND
  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    services:
      redis:
        image: redis:7-alpine
        ports:
        - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run tests
      run: npm ci && npm test
      working-directory: BACKEND
  build:
    runs-on: ubuntu-latest
    needs:
    - test
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: image=moby/buildkit:latest
    - name: Build image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.build_context || '.' }}
        file: ${{ matrix.service.build_context || '.' }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
        push: false
        load: true
        tags: local/${{ matrix.service.name }}:${{ github.sha }}
        cache-from: type=gha,scope=${{ matrix.service.name }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
  scan:
    runs-on: ubuntu-latest
    needs:
    - build
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    # Rebuild from the per-service GHA cache (fast — layers are hot from `build`).
    - name: Build image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.build_context || '.' }}
        file: ${{ matrix.service.build_context || '.' }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
        push: false
        load: true
        tags: ci-scan-${{ matrix.service.name }}:${{ github.sha }}
        cache-from: type=gha,scope=${{ matrix.service.name }}
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ci-scan-${{ matrix.service.name }}:${{ github.sha }}
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        exit-code: '1'
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
        category: trivy-${{ matrix.service.name }}
  push:
    runs-on: ubuntu-latest
    needs:
    - scan
    - detect-changes
    # Push only from push events (main/master), never from PRs, and only when a
    # registry is configured. Runs after `scan` so vulnerable images never land in ECR.
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' && inputs.ecr_registry != '' && github.event_name == 'push' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    # Tag contract shared with CD (cd-deploy-reusable.yml computes the identical
    # value from the workflow_run head SHA): sha-<first 7 chars of commit SHA>.
    - name: Compute image tag
      id: tag
      run: echo "tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ inputs.aws_region }}
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.build_context || '.' }}
        file: ${{ matrix.service.build_context || '.' }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
        push: true
        tags: ${{ inputs.ecr_registry }}/${{ matrix.service.image }}:${{ steps.tag.outputs.tag }}
        cache-from: type=gha,scope=${{ matrix.service.name }}
