name: CI Build
'on':
  pull_request:
    branches:
    - main
    - master
  push:
    branches:
    - main
    - master
permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write
jobs:
  ci-build:
    uses: ./.github/workflows/ci-build-reusable.yml
    with:
      services: '[{''name'': ''BACKEND'', ''build_context'': ''BACKEND'', ''dockerfile'': ''Dockerfile''}, {''name'': ''FRONTEND'',
        ''build_context'': ''FRONTEND'', ''dockerfile'': ''Dockerfile''}]'
      registries: '[''*.dkr.ecr.*.amazonaws.com'']'
    secrets: inherit
