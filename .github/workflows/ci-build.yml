name: CI Build
'on':
  pull_request:
    branches:
    - main
    - master
    - develop
  push:
    branches:
    - main
    - master
    - develop
permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write
  security-events: write
jobs:
  ci-build:
    uses: ./.github/workflows/ci-build-reusable.yml
    with:
      services: '[{"name": "BACKEND", "build_context": "BACKEND", "dockerfile": "Dockerfile", "image": "BACKEND"}, {"name":
        "FRONTEND", "build_context": "FRONTEND", "dockerfile": "Dockerfile", "image": "FRONTEND"}]'
      ecr_registry: ${{ vars.ECR_REGISTRY }}
    secrets: inherit
