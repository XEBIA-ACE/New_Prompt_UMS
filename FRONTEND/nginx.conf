server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy: the SPA is built with relative /api URLs, so this image works
    # unchanged in any environment. `ums-backend` is the Kubernetes Service
    # name (namespace ums); docker-compose gives its backend service the same
    # network alias so one config serves both. NOTE: nginx resolves this host
    # at startup — the container fails fast if the backend DNS name is absent.
    location /api/ {
        proxy_pass http://ums-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
