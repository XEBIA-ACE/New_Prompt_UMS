  epic_acceptance_criteria: []
technical_design:
  description: "## S-101\n\nKey words MUST, MUST NOT, SHALL, SHALL NOT, SHOULD, SHOULD\
    \ NOT, MAY, and OPTIONAL in this document are to be interpreted as described in\
    \ RFC 2119.\n\n### Contracts & Interfaces\n\n#### API Endpoints\n\n1. **POST /api/v1/users/request-deletion**\n\
    \   - **Description**: Initiates account deletion and sends a verification token\
    \ via email.\n   - **Request Payload**: \n     - `userId`: UUID of the user requesting\
    \ deletion\n   - **Response Codes**:\n     - `202 Accepted`: Verification token\
    \ sent\n     - `400 Bad Request`: Invalid `userId`\n     - `404 Not Found`: `userId`\
    \ does not exist\n\n2. **POST /api/v1/users/verify-deletion**\n   - **Description**:\
    \ Verifies the deletion request using the token.\n   - **Request Payload**:\n\
    \     - `token`: Verification token received in email\n   - **Response Codes**:\n\
    \     - `200 OK`: Token verified, account deletion in progress\n     - `400 Bad\
    \ Request`: Invalid or malformed token\n     - `404 Not Found`: Token does not\
    \ exist\n     - `410 Gone`: Token expired\n\n#### Data Schema\n\n1. **VerificationToken\
    \ Table**\n   - `token`: VARCHAR(36) PRIMARY KEY\n   - `userId`: UUID FOREIGN\
    \ KEY REFERENCES UserAccount(id)\n   - `expiresAt`: DATETIME\n   - **Indexes**:\n\
    \     - `idx_userId_token`: Composite index on `userId`, `token`\n\n### Test Strategy\n\
    \n1. **Test Case: Initiate Account Deletion Request**\n   - **Test**: POST /api/v1/users/request-deletion\n\
    \   - **Validations**:\n     - Confirm `202 Accepted` on valid `userId`\n    \
    \ - Confirm entry in `VerificationToken` table\n\n2. **Test Case: Verify Deletion\
    \ with Token**\n   - **Test**: POST /api/v1/users/verify-deletion\n   - **Validations**:\n\
    \     - Confirm `200 OK` with valid token\n     - Confirm account status change\
    \ in `UserAccount`\n\n3. **Test Case: Attempt Verification with Invalid Token**\n\
    \   - **Test**: POST /api/v1/users/verify-deletion\n   - **Validations**:\n  \
    \   - Confirm `404 Not Found` for unknown token\n     - Confirm `410 Gone` if\
    \ token expired\n\n### Implementation Approach\n\n#### Core Implementation Logic\n\
    \n- **Class**: `DeletionRequestHandler`\n  - **Method**: `initiateDeletion(userId:\
    \ UUID)`\n    - Generates a `VerificationToken`\n    - Inserts `VerificationToken`\
    \ into the database\n    - Sends an email with the token to `UserAccount.email`\n\
    \n- **Class**: `TokenVerificationHandler`\n  - **Method**: `verifyToken(token:\
    \ String)`\n    - Validates token against `VerificationToken` table\n    - Checks\
    \ for token expiry\n    - Deletes the user account upon successful verification\n\
    \    \n#### Inter-service Calls\n\n- For sending emails, an internal service call\
    \ to the `EmailNotificationService` SHALL be made using a RESTful POST method\
    \ with the token.\n\n#### Testing Approach\n\n- Unit tests SHALL be written for\
    \ `DeletionRequestHandler` and `TokenVerificationHandler`.\n- Integration tests\
    \ SHALL cover the complete deletion workflow from token generation to account\
    \ removal.\n- Security tests SHALL ensure that tokens cannot be forged or reused.\n\
    \n### Architectural Decision Records (ADRs)\n\n- **ADR-001**: Use of `VerificationToken`\
    \ pattern for deletion verification\n  - **Context**: Securely validate user consent\
    \ for account deletion\n  - **Decision**: Implement `VerificationToken` with expiration\n\
    \  - **Rationale**: Provides security, tracks consent, limits token misuse\n \
    \ - **Alternative**: Use OTP, rejected for complexity and user inconvenience\n\
    \n### Simplicity Gate Assessment\n\n- **Rating**: appropriate\n  - Each technical\
    \ element maps clearly to one or more functional requirements without excess complexity.\n\
    \n### Affected Services and API Changes\n\n- **User Management Service**\n  -\
    \ New API endpoints for initiating and verifying deletion requests.\n  - Affects\
    \ data model with `VerificationToken` schema updates.\n\n### Context\n\n- The\
    \ accounts MUST remain secure and only be deleted post-verification to ensure\
    \ compliance with expected user consent protocols."
