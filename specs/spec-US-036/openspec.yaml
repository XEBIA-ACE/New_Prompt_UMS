functional_requirement:
  description: '## S-101


    Key words MUST, MUST NOT, SHALL, SHALL NOT, SHOULD, SHOULD NOT, MAY, and OPTIONAL
    in this document are to be interpreted as described in RFC 2119.


    ---


    ### Purpose


    This specification defines the behavioral requirements for the Authentication
    Service within the User Management Service (S-101). It establishes what the system
    must do to authenticate users, manage session tokens, and support password recovery
    flows.


    ---


    ### Scope


    This specification covers the login, logout, password recovery, and password reset
    capabilities of the User Management Service. It applies to all actors who interact
    with the authentication flows, including end-users accessing the system through
    a client or browser and the API Gateway acting as the inbound routing layer.


    ---


    ### Non-Goals


    - User registration and account activation flows

    - OTP issuance or verification logic

    - Account deletion or profile management

    - Role-based access control or authorization policy enforcement

    - Token introspection or validation performed by downstream services

    - Multi-factor authentication beyond OTP-assisted password recovery

    - Social or federated identity provider integration

    - Session storage or distributed cache configuration


    ---


    ### Key Entities


    **User**

    - Attributes: identifier (unique), email address (string), hashed credential (string),
    account status (enumerated: active, inactive, locked), failed login attempt count
    (integer), last login timestamp (datetime)

    - Relationships: owns zero or one active Session; owns zero or more PasswordRecoveryRequest
    records


    **Session**

    - Attributes: session token (string, opaque), issued-at timestamp (datetime),
    expiry timestamp (datetime), revocation status (boolean)

    - Relationships: belongs to exactly one User


    **PasswordRecoveryRequest**

    - Attributes: recovery token (string, opaque), requested-at timestamp (datetime),
    expiry timestamp (datetime), consumed status (boolean)

    - Relationships: belongs to exactly one User


    ---


    ### Functional Requirements


    `FR-001: User Management Service SHALL accept a credential submission containing
    an email address and a plaintext password as inputs to the login flow.`

    Priority: P1


    `FR-002: User Management Service SHALL verify that the submitted email address
    corresponds to a registered account before evaluating the password.`

    Priority: P1


    `FR-003: User Management Service SHALL reject a login attempt when the corresponding
    account status is not active.`

    Priority: P2


    `FR-004: User Management Service SHALL compare the submitted password against
    the stored credential representation using a secure comparison method.`

    Priority: P1


    `FR-005: User Management Service SHALL issue a session token to the authenticated
    user upon successful credential verification.`

    Priority: P1


    `FR-006: User Management Service SHALL record the timestamp of each successful
    login against the user''s account.`

    Priority: P2


    `FR-007: User Management Service SHALL increment a failed login attempt counter
    on the user''s account each time credential verification fails.`

    Priority: P2


    `FR-008: User Management Service SHALL lock the user''s account after the failed
    login attempt counter reaches a defined consecutive-failure threshold.`

    Priority: P2


    [NEEDS CLARIFICATION: What is the maximum number of consecutive failed login attempts
    before account lockout?] (Assumed: 5 consecutive failures trigger lockout.)


    `FR-009: User Management Service SHALL reset the failed login attempt counter
    to zero upon a successful login.`

    Priority: P2


    `FR-010: User Management Service SHALL accept a logout request containing a valid
    session token and revoke that session immediately.`

    Priority: P1


    `FR-011: User Management Service SHALL reject any subsequent authenticated action
    that presents a revoked session token.`

    Priority: P2


    `FR-012: User Management Service SHALL accept a password recovery request containing
    a registered email address and SHALL dispatch a time-limited recovery token to
    that address via the notification integration point.`

    Priority: P1


    `FR-013: User Management Service SHALL reject a password recovery request for
    an email address that does not correspond to a registered account without disclosing
    whether the account exists.`

    Priority: P2


    `FR-014: User Management Service SHALL accept a password reset submission containing
    a recovery token and a new plaintext password.`

    Priority: P1


    `FR-015: User Management Service SHALL validate that the submitted recovery token
    is unexpired and has not previously been consumed before applying the password
    change.`

    Priority: P1


    `FR-016: User Management Service SHALL mark the recovery token as consumed immediately
    after a successful password reset.`

    Priority: P2


    `FR-017: User Management Service SHALL enforce a minimum complexity rule on any
    newly submitted password during the password reset flow.`

    Priority: P2


    [NEEDS CLARIFICATION: What are the specific password complexity requirements (minimum
    length, character classes)?] (Assumed: Minimum 8 characters, at least one uppercase
    letter, one digit.)


    `FR-018: User Management Service SHALL invalidate all existing active sessions
    belonging to a user when that user''s password is successfully reset.`

    Priority: P2


    `FR-019: User Management Service SHOULD return a descriptive rejection reason
    to the caller when a login, logout, or password operation fails, without exposing
    internal system state.`

    Priority: P3


    `FR-020: User Management Service SHALL expose a health-check capability that reports
    the operational status of the authentication service to the API Gateway.`

    Priority: P2


    ---


    ### Assumptions


    `A-001`: The Authentication Service operates exclusively behind the API Gateway,
