technical_design:
  description: "## S-101\n\nKey words MUST, MUST NOT, SHALL, SHALL NOT, SHOULD, SHOULD\
    \ NOT, MAY, and OPTIONAL in this document are to be interpreted as described in\
    \ RFC 2119.\n\n---\n\n## 1. Contracts & Interfaces\n\n### 1.1 API Contracts\n\n\
    #### 1.1.1 POST /api/v1/user/register\n\n- Description: Initiate mobile user registration\n\
    - Request Body:\n  - given_name (string, REQUIRED)\n  - family_name (string, REQUIRED)\n\
    \  - mobile_number (string, REQUIRED, E.164 format)\n  - password (string, REQUIRED,\
    \ password policy applies)\n  - email_address (string, REQUIRED, valid email)\n\
    - Success Response: 201 Created\n  - Body: user_id (UUID), registration_status\
    \ (\"PENDING_VERIFICATION\"), otp_sent (boolean)\n- Error Responses:\n  - 400\
    \ Bad Request (missing/invalid fields, weak password, invalid format)\n  - 409\
    \ Conflict (duplicate mobile_number/email_address)\n  - 500 Internal Server Error\
    \ (unexpected failure)\n  - Error Body: code (string), message (string)\n\n####\
    \ 1.1.2 POST /api/v1/user/otp/send\n\n- Description: Initiate OTP delivery for\
    \ registration\n- Request Body:\n  - user_id (UUID, REQUIRED)\n- Success Response:\
    \ 200 OK\n  - Body: otp_id (UUID), expiry (datetime), status (\"SENT\")\n- Error\
    \ Responses:\n  - 404 Not Found (user not in PENDING_VERIFICATION)\n  - 429 Too\
    \ Many Requests (rate limit exceeded) [via OTP Handler]\n  - 400 Bad Request (invalid\
    \ user_id)\n\n#### 1.1.3 POST /api/v1/user/otp/verify\n\n- Description: Complete\
    \ registration by submitting OTP\n- Request Body:\n  - user_id (UUID, REQUIRED)\n\
    \  - otp_code (string, REQUIRED)\n- Success Response: 200 OK\n  - Body: user_id\
    \ (UUID), registration_status (\"ACTIVE\")\n- Error Responses:\n  - 400 Bad Request\
    \ (invalid/expired OTP)\n  - 401 Unauthorized (incorrect OTP)\n  - 409 Conflict\
    \ (already verified)\n  - 404 Not Found (user not found)\n\n#### 1.1.4 POST /api/v1/user/otp/resend\n\
    \n- Description: Retry OTP delivery. Rate limits/expiry enforced by OTP Handler.\n\
    - Request Body:\n  - user_id (UUID, REQUIRED)\n- Success Response: 200 OK (otp\
    \ resent)\n- Error Response: 429 Too Many Requests (rate limited)\n\n### 1.2 Data\
    \ Schema Changes\n\n#### User Table (`users`)\n\n- user_id: UUID (PK)\n- given_name:\
    \ VARCHAR(128) NOT NULL\n- family_name: VARCHAR(128) NOT NULL\n- mobile_number:\
    \ VARCHAR(32) NOT NULL, UNIQUE\n- password: VARCHAR(256) NOT NULL\n- email_address:\
    \ VARCHAR(256) NOT NULL, UNIQUE\n- registration_status: ENUM('PENDING_VERIFICATION',\
    \ 'ACTIVE', 'REJECTED') DEFAULT 'PENDING_VERIFICATION'\n- created_at: TIMESTAMP\
    \ NOT NULL\n\n**Indexes**:\n- UNIQUE INDEX idx_users_mobile_number (mobile_number)\n\
    - UNIQUE INDEX idx_users_email_address (email_address)\n\n#### OTPVerification\
    \ Table (`otp_verifications`)\n\n- otp_id: UUID (PK)\n- user_id: UUID (FK to users.user_id,\
    \ UNIQUE NOT NULL)\n- otp_code: VARCHAR(16) NOT NULL\n- expiry: TIMESTAMP NOT\
    \ NULL\n- status: ENUM('SENT', 'VERIFIED', 'EXPIRED') NOT NULL\n- created_at:\
    \ TIMESTAMP NOT NULL\n\n**Indexes**:\n- UNIQUE INDEX idx_otp_user (user_id)\n\n\
    ---\n\n## 2. Test Strategy\n\n### 2.1 Registration API Test Cases (`POST /api/v1/user/register`)\n\
    \n- TC-01: Register with all valid fields (verify 201, correct schema, registration_status=PENDING_VERIFICATION,\
    \ otp_sent)\n- TC-02: Register missing required field (400, code/message verify\
    \ missing field – validates error contract)\n- TC-03: Register with weak password\
    \ (400, code/message indicates weak password – validates password validation)\n\
    - TC-04: Register with invalid email (400, code/message indicates invalid email\
    \ – validates email syntax)\n- TC-05: Register with duplicate mobile_number (409,\
    \ code/message specifies duplicate mobile_number)\n- TC-06: Register with duplicate\
    \ email_address (409, code/message specifies duplicate email_address)\n- TC-07:\
    \ Register with internal DB error (500)\n\n### 2.2 OTP Send/Resend API (`POST\
    \ /api/v1/user/otp/send`, `POST /api/v1/user/otp/resend`)\n\n- TC-08: Send OTP\
    \ for pending user (200, correct status/expiry)\n- TC-09: OTP send for non-existent\
    \ user (404)\n- TC-10: OTP resend within rate limit (200)\n- TC-11: OTP resend\
    \ exceeding rate limit (429)\n- TC-12: OTP send where user is not pending (404)\n\
    \n### 2.3 OTP Verification API (`POST /api/v1/user/otp/verify`)\n\n- TC-13: Verify\
    \ valid OTP before expiry (200, user status ACTIVE)\n- TC-14: Verify expired OTP\
    \ (400 or 401, user remains PENDING_VERIFICATION)\n- TC-15: Verify incorrect OTP\
    \ (401)\n- TC-16: Verify already active user (409)\n- TC-17: Verify with invalid\
    \ user_id (404)\n\n### 2.4 Data Model\n\n- TC-18: After registration, record written\
    \ to `users` with correct fields, status=PENDING_VERIFICATION\n- TC-19: After\
    \ OTP send, record in `otp_verifications` with user_id, otp_code, status=SENT"
